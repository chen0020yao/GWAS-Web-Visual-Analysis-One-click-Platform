<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genomix - 交互式 GWAS 云分析平台</title>

    <!-- 1. 预读字体：引入现代感、可读性强的系统字体族 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <!-- 2. 全局基础样式：确保在 Vue 挂载前不出现白屏突兀感 -->
    <style>
        :root {
            --primary-color: #42b983;
            --bg-deep: #0f172a;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
            overflow-x: hidden;
        }
        /* 初次加载的骨架屏动画 */
        #app-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Inter', sans-serif;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loader-text {
            margin-top: 16px;
            color: #64748b;
            font-size: 14px;
            letter-spacing: 0.05em;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<!-- 3. 应用挂载节点 -->
<div id="app">
    <!-- 在 Vue 接管前显示的 Loading 状态，Vue 挂载后会自动替换此区域 -->
    <div id="app-loader">
        <div class="spinner"></div>
        <div class="loader-text">初始化 GWAS 交互环境...</div>
    </div>
</div>

<!-- 4. 脚本入口 -->
<script type="module" src="/src/main.ts"></script>

<!--
  提示：
  - 关于 λGC 的数学公式展示，我们在前端代码中使用 LaTeX 格式。
  - 系统会自动处理 Web 交互（ECharts 绘图及渲染）。
  - 所有的物种参考、SNP 标注逻辑均在 src/ 目录下的组件内实现。
-->
</body>
</html>
